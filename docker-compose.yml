# =============================================================================
# telegram-ai-org docker-compose.yml — 조직별 봇 컨테이너 + 3엔진 이미지 분리
#
# 사용법:
#   # 1) 환경 변수 준비
#   cp .env.example .env
#
#   # 2) 특정 엔진 이미지만 빌드
#   docker compose build aiorg-pm aiorg-product-bot aiorg-design-bot
#
#   # 3) Codex 계열 서비스만 실행
#   docker compose --profile codex up -d
#
#   # 4) 전체 조직 실행
#   docker compose --profile claude --profile codex --profile gemini up -d
#
# 환경변수 주입 원칙:
#   - 공통 시크릿/토큰/API 키: .env (env_file) 에서 주입
#   - 엔진별 런타임 변수(ENGINE_TYPE, *_CLI_PATH 등): 각 서비스 environment 블록에서 주입
# =============================================================================

x-bot-common: &bot-common
  env_file:
    - .env
  volumes:
    - ./logs:/app/logs
    - ./data:/app/data
    - ./reports:/app/reports
    - ./tasks:/app/tasks
  restart: unless-stopped
  depends_on:
    aiorg-redis:
      condition: service_healthy
  healthcheck:
    test:
      [
        "CMD",
        "python",
        "-c",
        "import os,sys; sys.exit(0 if os.path.exists(f'/tmp/telegram-ai-org-{os.environ.get(\"PM_ORG_NAME\",\"global\")}.pid') else 1)",
      ]
    interval: 60s
    timeout: 10s
    start_period: 30s
    retries: 3
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"

services:
  aiorg-pm:
    <<: *bot-common
    profiles: [claude]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ENGINE: claude
    image: telegram-ai-org:claude
    container_name: aiorg-pm
    command: ["--org", "aiorg_pm_bot"]
    environment:
      PM_ORG_NAME: aiorg_pm_bot
      ENGINE_TYPE: claude-code
      CLAUDE_CLI_PATH: /opt/cli/bin/claude

  aiorg-product-bot:
    <<: *bot-common
    profiles: [claude]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ENGINE: claude
    image: telegram-ai-org:claude
    container_name: aiorg-product-bot
    command: ["--org", "aiorg_product_bot"]
    environment:
      PM_ORG_NAME: aiorg_product_bot
      ENGINE_TYPE: claude-code
      CLAUDE_CLI_PATH: /opt/cli/bin/claude

  aiorg-design-bot:
    <<: *bot-common
    profiles: [claude]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ENGINE: claude
    image: telegram-ai-org:claude
    container_name: aiorg-design-bot
    command: ["--org", "aiorg_design_bot"]
    environment:
      PM_ORG_NAME: aiorg_design_bot
      ENGINE_TYPE: claude-code
      CLAUDE_CLI_PATH: /opt/cli/bin/claude

  aiorg-engineering-bot:
    <<: *bot-common
    profiles: [codex]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ENGINE: codex
    image: telegram-ai-org:codex
    container_name: aiorg-engineering-bot
    command: ["--org", "aiorg_engineering_bot"]
    environment:
      PM_ORG_NAME: aiorg_engineering_bot
      ENGINE_TYPE: codex
      CODEX_CLI_PATH: /opt/cli/bin/codex

  aiorg-ops-bot:
    <<: *bot-common
    profiles: [codex]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ENGINE: codex
    image: telegram-ai-org:codex
    container_name: aiorg-ops-bot
    command: ["--org", "aiorg_ops_bot"]
    environment:
      PM_ORG_NAME: aiorg_ops_bot
      ENGINE_TYPE: codex
      CODEX_CLI_PATH: /opt/cli/bin/codex

  aiorg-growth-bot:
    <<: *bot-common
    profiles: [gemini]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ENGINE: gemini
    image: telegram-ai-org:gemini
    container_name: aiorg-growth-bot
    command: ["--org", "aiorg_growth_bot"]
    environment:
      PM_ORG_NAME: aiorg_growth_bot
      ENGINE_TYPE: gemini-cli
      GEMINI_CLI_PATH: /opt/cli/bin/gemini
      GEMINI_CLI_DEFAULT_TIMEOUT_SEC: "1800"
      GEMINI_CLI_MODEL: gemini-2.5-flash

  aiorg-research-bot:
    <<: *bot-common
    profiles: [gemini]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ENGINE: gemini
    image: telegram-ai-org:gemini
    container_name: aiorg-research-bot
    command: ["--org", "aiorg_research_bot"]
    environment:
      PM_ORG_NAME: aiorg_research_bot
      ENGINE_TYPE: gemini-cli
      GEMINI_CLI_PATH: /opt/cli/bin/gemini
      GEMINI_CLI_DEFAULT_TIMEOUT_SEC: "1800"
      GEMINI_CLI_MODEL: gemini-2.5-flash

  aiorg-redis:
    image: redis:7-alpine
    container_name: aiorg-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:6379:6379"

volumes:
  redis-data:
    driver: local
