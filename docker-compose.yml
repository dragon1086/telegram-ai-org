# =============================================================================
# telegram-ai-org docker-compose.yml
#
# 사용법:
#   # 기본 (claude-code 엔진, PM 봇만)
#   docker compose up
#
#   # Claude Code 엔진 프로파일
#   docker compose --profile claude up
#
#   # Codex 엔진 프로파일
#   docker compose --profile codex up
#
#   # Gemini CLI 엔진 프로파일
#   docker compose --profile gemini up
#
#   # 전체 (모든 부서 봇)
#   docker compose --profile claude up aiorg-pm aiorg-workers
# =============================================================================

version: "3.9"

# ─── 공통 설정 ────────────────────────────────────────────────────────────────
x-common-env: &common-env
  env_file:
    - .env
  volumes:
    - ./logs:/app/logs
    - ./data:/app/data
    - ./reports:/app/reports
    - ./tasks:/app/tasks
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"

x-base-build: &base-build
  context: .
  dockerfile: Dockerfile

# ─── 서비스 정의 ──────────────────────────────────────────────────────────────
services:

  # ─── PM 봇 (기본 — 항상 실행) ────────────────────────────────────────────
  aiorg-pm:
    <<: *common-env
    build:
      <<: *base-build
      args:
        ENGINE: base
    image: telegram-ai-org:latest
    container_name: aiorg-pm
    command: ["python", "main.py"]
    healthcheck:
      test: ["CMD", "python", "-c",
             "import os,sys; sys.exit(0 if os.path.exists(f'/tmp/telegram-ai-org-{os.environ.get(\"PM_ORG_NAME\",\"global\")}.pid') else 1)"]
      interval: 60s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ─── Claude Code 엔진 PM 봇 ──────────────────────────────────────────────
  aiorg-pm-claude:
    <<: *common-env
    profiles: [claude]
    build:
      <<: *base-build
      args:
        ENGINE: claude
    image: telegram-ai-org:claude
    container_name: aiorg-pm-claude
    command: ["python", "main.py", "--org", "aiorg_pm_bot"]
    environment:
      ENGINE: claude-code
    depends_on:
      aiorg-redis:
        condition: service_healthy

  # ─── Codex 엔진 봇 (운영실) ───────────────────────────────────────────────
  aiorg-worker-codex:
    <<: *common-env
    profiles: [codex]
    build:
      <<: *base-build
      args:
        ENGINE: codex
    image: telegram-ai-org:codex
    container_name: aiorg-worker-codex
    command: ["python", "-m", "core.run_worker", "--name", "aiorg_ops_bot"]
    environment:
      ENGINE: codex
    depends_on:
      aiorg-redis:
        condition: service_healthy

  # ─── Gemini CLI 엔진 봇 (성장실·리서치실) ────────────────────────────────
  aiorg-worker-gemini:
    <<: *common-env
    profiles: [gemini]
    build:
      <<: *base-build
      args:
        ENGINE: gemini
    image: telegram-ai-org:gemini
    container_name: aiorg-worker-gemini
    command: ["python", "-m", "core.run_worker", "--name", "aiorg_growth_bot"]
    environment:
      ENGINE: gemini-cli
      GEMINI_CLI_PATH: /opt/cli/bin/gemini
      GEMINI_CLI_DEFAULT_TIMEOUT_SEC: "1800"
    depends_on:
      aiorg-redis:
        condition: service_healthy

  # ─── 워커 봇 (claude-code 엔진 — 개발실·기획실·디자인실) ─────────────────
  aiorg-workers:
    <<: *common-env
    profiles: [claude]
    build:
      <<: *base-build
      args:
        ENGINE: claude
    image: telegram-ai-org:claude
    container_name: aiorg-workers
    # 여러 워커를 하나의 컨테이너에서 순차 실행
    # 프로덕션에서는 각 워커를 별도 컨테이너로 분리 권장
    command: >
      sh -c "
        python -m core.run_worker --name aiorg_engineering_bot &
        python -m core.run_worker --name aiorg_product_bot &
        python -m core.run_worker --name aiorg_design_bot &
        wait
      "
    depends_on:
      aiorg-redis:
        condition: service_healthy

  # ─── Redis (선택 — 세션/캐시 사이드카) ──────────────────────────────────
  aiorg-redis:
    image: redis:7-alpine
    container_name: aiorg-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:6379:6379"

# ─── 볼륨 ─────────────────────────────────────────────────────────────────────
volumes:
  redis-data:
    driver: local
