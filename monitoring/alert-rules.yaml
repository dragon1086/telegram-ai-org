# =============================================================================
# monitoring/alert-rules.yaml
# telegram-ai-org 운영 알람 룰 정의
#
# 형식:
#   - id:          알람 고유 식별자
#   - name:        알람 이름
#   - condition:   트리거 조건 (로그 패턴 또는 메트릭 임계값)
#   - severity:    critical / warning / info
#   - channel:     알림 채널 (telegram / log / both)
#   - tasks:       관련 태스크 ID (원인 추적용)
#   - description: 이 알람이 탐지하는 문제 설명
#   - remediation: 권장 조치
#
# 추가 원칙:
#   - infra-baseline.yaml 의 warn_above 값과 일치시킨다
#   - 새 임계값 변경 시 두 파일을 동시에 수정한다
# =============================================================================

alert_rules:

  # ---------------------------------------------------------------------------
  # ALERT-01: E2E timeout 초과
  # ETC-02 대응 — E2E 테스트가 baseline(120s) 초과 시 경보
  # ---------------------------------------------------------------------------
  - id: ALERT-01
    name: e2e_timeout_exceeded
    tasks: [ETC-02]
    severity: critical
    channel: both   # telegram + log
    description: |
      E2E 테스트 단일 시나리오 실행 시간이 infra-baseline 기준(120s)을 초과.
      pytest --timeout 또는 스크립트 내부 타임아웃 로직이 120s에 도달하거나
      그 이상 경과 시 트리거된다.
    condition:
      type: log_pattern
      match_any:
        - "FAILED.*timeout"
        - "TimeoutExpired"
        - "E2E.*exceeded.*120"
        - "slow_scenario_sec exceeded"
        - "pytest.*TIMEOUT"
      threshold_sec: 120        # infra-baseline.yaml timeouts.e2e.slow_scenario_sec.default
      source_files:
        - "scripts/e2e_full_suite.py"
        - "tests/e2e/"
    remediation: |
      1. infra-baseline.yaml 의 timeouts.e2e.slow_scenario_sec 값 확인
      2. 실제 시나리오 실행 시간 vs 임계값 비교 (pytest -v 로그 확인)
      3. 네트워크 지연 또는 LLM 응답 지연 여부 점검
      4. 120s 초과가 정상 범위라면 baseline 값 상향 후 PR 제출

  # ---------------------------------------------------------------------------
  # ALERT-02: Telethon listener min_id 필터 누락
  # ETC-03 대응 — min_id 필터 없이 리스너가 기동될 때 경보
  # ---------------------------------------------------------------------------
  - id: ALERT-02
    name: telethon_min_id_filter_missing
    tasks: [ETC-03]
    severity: critical
    channel: both   # telegram + log
    description: |
      TelethonListenerHelper 가 min_id 없이 기동될 경우 cross-contamination
      (이전 테스트의 메시지가 현재 테스트에 유입) 위험.
      리스너 활성화 시 min_id 가 기록되지 않았거나 None 인 경우 트리거된다.
    condition:
      type: log_pattern
      match_any:
        - "min_id.*None"
        - "TelethonListenerHelper.*min_id not set"
        - "listener activated without min_id"
        - "WARNING.*min_id.*missing"
      source_files:
        - "scripts/telethon_listener.py"
        - "scripts/e2e_full_suite.py"
        - "scripts/e2e_collab_discussion_test.py"
    remediation: |
      1. telethon_listener.py 의 TelethonListenerHelper 초기화 코드 확인
      2. record_on_activation 전략이 적용됐는지 검증
         (infra-baseline.yaml filters.telethon_listener.min_id_strategy 참조)
      3. min_id = 최신 message.id 기록 로직이 listen() 호출 전에 실행되는지 확인
      4. 필요 시 tests/e2e/preflight_check.py 의 filter 검증 항목 확인

  # ---------------------------------------------------------------------------
  # ALERT-03: Cross-contamination 발생
  # ETC-03 대응 — 테스트 간 메시지 혼입이 실제로 탐지됐을 때 경보
  # ---------------------------------------------------------------------------
  - id: ALERT-03
    name: cross_contamination_detected
    tasks: [ETC-03]
    severity: critical
    channel: both   # telegram + log
    description: |
      E2E 테스트 중 이전 테스트 세션의 메시지 또는 다른 시나리오의 응답이
      현재 테스트 어설션에 혼입된 경우 트리거된다.
      min_id 필터가 동작했음에도 id <= min_id 메시지가 처리됐거나,
      assert/결과 불일치 패턴이 탐지될 때 발생한다.
    condition:
      type: log_pattern
      match_any:
        - "cross.contamination"
        - "unexpected message.*old session"
        - "message id.*<=.*min_id.*processed"
        - "AssertionError.*unexpected.*response"
        - "stale message detected"
      source_files:
        - "scripts/telethon_listener.py"
        - "scripts/e2e_full_suite.py"
        - "scripts/e2e_collab_discussion_test.py"
        - "tests/e2e/"
    remediation: |
      1. 즉시 E2E 테스트 세션 중단
      2. telethon 세션 파일(.session) 초기화 또는 재생성
      3. min_id 기록 시점 재확인 — listen() 호출 직전에 실행되고 있는지 검증
      4. E2E 테스트 재실행 전 ALERT-02 조건 해소 확인
      5. 근본원인 확인 후 incident 리포트 작성

# -----------------------------------------------------------------------------
# 알람 운영 설정
# -----------------------------------------------------------------------------
settings:
  baseline_version_ref: "infra-baseline.yaml"   # 임계값 원본 참조
  alert_cooldown_sec: 300                         # 동일 알람 재발송 최소 간격 (5분)
  log_level: WARNING                              # WARNING 이상 로그만 알람 트리거
  created_at: "2026-03-26"
  created_by: "aiorg_ops_bot"
  tasks: [ETC-02, ETC-03]
