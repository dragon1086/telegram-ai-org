      instructions: 상세 기획서와 로드맵을 작성하세요.
      deliverables:
        - 상세 기획서
        - 로드맵
    - name: 리스크 분석
      instructions: 구현 시 예상되는 리스크와 대응 방안을 정리하세요.
      deliverables:
        - 리스크 분석 보고서
