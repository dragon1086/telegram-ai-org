<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#30363d"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b5cf6"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="#0d1117" rx="12"/>
  <rect width="900" height="500" fill="none" stroke="#30363d" stroke-width="1" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="15" font-weight="600" fill="#e6edf3">telegram-ai-org — System Architecture</text>
  <line x1="40" y1="50" x2="860" y2="50" stroke="#21262d" stroke-width="1"/>

  <!-- User node -->
  <rect x="370" y="68" width="160" height="52" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="89" text-anchor="middle" font-family="sans-serif" font-size="18">📱</text>
  <text x="450" y="108" text-anchor="middle" font-family="'Inter', sans-serif" font-size="13" fill="#e6edf3" font-weight="500">Telegram User</text>

  <!-- Arrow down to PM -->
  <line x1="450" y1="120" x2="450" y2="155" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- PM Bot node -->
  <rect x="340" y="155" width="220" height="60" rx="10" fill="#8b5cf6" filter="url(#shadow)"/>
  <text x="450" y="178" text-anchor="middle" font-family="sans-serif" font-size="20">🎯</text>
  <text x="450" y="198" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#ffffff" font-weight="700">PM Bot</text>
  <text x="450" y="211" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="rgba(255,255,255,0.7)">[claude-code]</text>

  <!-- Arrows from PM to departments -->
  <!-- 개발실 -->
  <line x1="380" y1="215" x2="150" y2="290" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowPurple)"/>
  <!-- 디자인실 -->
  <line x1="400" y1="215" x2="290" y2="290" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowPurple)"/>
  <!-- 기획실 -->
  <line x1="440" y1="215" x2="450" y2="290" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowPurple)"/>
  <!-- 운영실 -->
  <line x1="520" y1="215" x2="620" y2="290" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowPurple)"/>
  <!-- 성장실 -->
  <line x1="550" y1="215" x2="760" y2="290" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowPurple)"/>

  <!-- Department nodes — Claude engine (blue) -->
  <!-- 개발실 -->
  <rect x="60" y="290" width="160" height="65" rx="8" fill="#21262d" stroke="#4285F4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="140" y="314" text-anchor="middle" font-family="sans-serif" font-size="17">⚙️</text>
  <text x="140" y="333" text-anchor="middle" font-family="'Inter', sans-serif" font-size="13" fill="#e6edf3" font-weight="600">개발실</text>
  <text x="140" y="349" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#4285F4">claude-code</text>

  <!-- 디자인실 -->
  <rect x="210" y="290" width="160" height="65" rx="8" fill="#21262d" stroke="#4285F4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="290" y="314" text-anchor="middle" font-family="sans-serif" font-size="17">🎨</text>
  <text x="290" y="333" text-anchor="middle" font-family="'Inter', sans-serif" font-size="13" fill="#e6edf3" font-weight="600">디자인실</text>
  <text x="290" y="349" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#4285F4">claude-code</text>

  <!-- 기획실 -->
  <rect x="370" y="290" width="160" height="65" rx="8" fill="#21262d" stroke="#4285F4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="314" text-anchor="middle" font-family="sans-serif" font-size="17">📋</text>
  <text x="450" y="333" text-anchor="middle" font-family="'Inter', sans-serif" font-size="13" fill="#e6edf3" font-weight="600">기획실</text>
  <text x="450" y="349" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#4285F4">claude-code</text>

  <!-- 운영실 — Codex (green) -->
  <rect x="530" y="290" width="160" height="65" rx="8" fill="#21262d" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="610" y="314" text-anchor="middle" font-family="sans-serif" font-size="17">🔧</text>
  <text x="610" y="333" text-anchor="middle" font-family="'Inter', sans-serif" font-size="13" fill="#e6edf3" font-weight="600">운영실</text>
  <text x="610" y="349" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#10b981">codex</text>

  <!-- 성장실/리서치실 — Gemini (blue) -->
  <rect x="690" y="290" width="160" height="65" rx="8" fill="#21262d" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="770" y="308" text-anchor="middle" font-family="sans-serif" font-size="14">📈 🔬</text>
  <text x="770" y="330" text-anchor="middle" font-family="'Inter', sans-serif" font-size="13" fill="#e6edf3" font-weight="600">성장실 · 리서치실</text>
  <text x="770" y="349" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#f59e0b">gemini-cli</text>

  <!-- Legend -->
  <rect x="40" y="400" width="820" height="70" rx="8" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="60" y="422" font-family="'Inter', sans-serif" font-size="12" fill="#6e7681" font-weight="600">ENGINE LEGEND</text>
  <!-- Claude -->
  <rect x="60" y="432" width="12" height="12" rx="2" fill="#4285F4"/>
  <text x="80" y="443" font-family="'JetBrains Mono', monospace" font-size="11" fill="#8b949e">claude-code — 개발실, 디자인실, 기획실, PM</text>
  <!-- Codex -->
  <rect x="370" y="432" width="12" height="12" rx="2" fill="#10b981"/>
  <text x="390" y="443" font-family="'JetBrains Mono', monospace" font-size="11" fill="#8b949e">codex — 운영실 (DevOps 경량화)</text>
  <!-- Gemini -->
  <rect x="60" y="454" width="12" height="12" rx="2" fill="#f59e0b"/>
  <text x="80" y="465" font-family="'JetBrains Mono', monospace" font-size="11" fill="#8b949e">gemini-cli — 성장실, 리서치실 (Google 검색 내장)</text>
  <!-- PM -->
  <rect x="370" y="454" width="12" height="12" rx="2" fill="#8b5cf6"/>
  <text x="390" y="465" font-family="'JetBrains Mono', monospace" font-size="11" fill="#8b949e">PM 라우터 — 모든 태스크 오케스트레이션</text>

</svg>
