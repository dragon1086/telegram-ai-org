<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="claudeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="geminiGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4285F4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a56db;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="codexGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bgGrad)"/>

  <!-- Grid lines (subtle) -->
  <g stroke="#21262d" stroke-width="1" opacity="0.5">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="80" y1="0" x2="80" y2="640"/>
    <line x1="1200" y1="0" x2="1200" y2="640"/>
  </g>

  <!-- Top terminal bar -->
  <rect x="0" y="0" width="1280" height="44" fill="#161b22"/>
  <rect x="0" y="43" width="1280" height="1" fill="#30363d"/>
  <!-- Terminal dots -->
  <circle cx="28" cy="22" r="7" fill="#f85149"/>
  <circle cx="52" cy="22" r="7" fill="#d29922"/>
  <circle cx="76" cy="22" r="7" fill="#3fb950"/>
  <!-- Terminal title -->
  <text x="640" y="28" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#8b949e">telegram-ai-org — v1.0.0</text>

  <!-- Prompt line -->
  <text x="120" y="120" font-family="'JetBrains Mono', monospace" font-size="18" fill="#3fb950">$</text>
  <text x="145" y="120" font-family="'JetBrains Mono', monospace" font-size="18" fill="#8b949e">pip install telegram-ai-org</text>
  <rect x="490" y="103" width="12" height="18" fill="#8b5cf6" opacity="0.9"/>

  <!-- Robot icon area (large) -->
  <text x="115" y="260" font-size="80" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif">🤖</text>

  <!-- Main title -->
  <text x="235" y="215" font-family="'JetBrains Mono', monospace" font-size="56" font-weight="700" fill="#e6edf3" filter="url(#glow)">telegram-ai-org</text>

  <!-- Subtitle -->
  <text x="237" y="265" font-family="'Inter', system-ui, sans-serif" font-size="26" fill="#8b949e">Build Your AI Organization on Telegram</text>
  <text x="237" y="300" font-family="'Inter', system-ui, sans-serif" font-size="26" fill="#8b949e">— set up in <tspan fill="#8b5cf6" font-weight="600">10 minutes</tspan></text>

  <!-- Divider -->
  <rect x="120" y="340" width="1040" height="1" fill="#30363d"/>

  <!-- Engine badges -->
  <!-- Claude Code badge -->
  <rect x="120" y="365" width="220" height="52" rx="8" fill="url(#claudeGrad)"/>
  <text x="230" y="386" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="rgba(255,255,255,0.7)">ENGINE</text>
  <text x="230" y="405" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="700" fill="#ffffff">Claude Code</text>

  <!-- Gemini CLI badge -->
  <rect x="360" y="365" width="220" height="52" rx="8" fill="url(#geminiGrad)"/>
  <text x="470" y="386" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="rgba(255,255,255,0.7)">ENGINE</text>
  <text x="470" y="405" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="700" fill="#ffffff">Gemini CLI</text>

  <!-- Codex CLI badge -->
  <rect x="600" y="365" width="220" height="52" rx="8" fill="url(#codexGrad)"/>
  <text x="710" y="386" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="rgba(255,255,255,0.7)">ENGINE</text>
  <text x="710" y="405" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="700" fill="#ffffff">Codex CLI</text>

  <!-- Stats badges -->
  <rect x="870" y="365" width="130" height="52" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="935" y="386" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#8b949e">LICENSE</text>
  <text x="935" y="405" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="700" fill="#3fb950">MIT</text>

  <rect x="1020" y="365" width="140" height="52" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="1090" y="386" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#8b949e">PYTHON</text>
  <text x="1090" y="405" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="700" fill="#4285F4">3.11+</text>

  <!-- Bottom section -->
  <rect x="0" y="555" width="1280" height="85" fill="#161b22"/>
  <rect x="0" y="555" width="1280" height="1" fill="#30363d"/>

  <!-- Bottom text -->
  <text x="120" y="597" font-family="'JetBrains Mono', monospace" font-size="14" fill="#6e7681">version</text>
  <text x="195" y="597" font-family="'JetBrains Mono', monospace" font-size="14" fill="#8b5cf6" font-weight="600">v1.0.0</text>

  <text x="120" y="622" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#6e7681">github.com/dragon1086/telegram-ai-org</text>

  <!-- Right bottom: org badges -->
  <text x="1160" y="600" text-anchor="end" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#6e7681">7 AI departments</text>
  <text x="1160" y="622" text-anchor="end" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#6e7681">288 E2E tests passing</text>

</svg>
