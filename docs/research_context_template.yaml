# =============================================================================
# research_context.yaml — 리서치 산출물 메타데이터 표준 템플릿
# =============================================================================
# 목적: 리서치 결과의 재현성 확보 및 환경 노이즈 추적을 위한 표준 포맷
# 버전: 1.0.0 (2026-03-26)
# 표준 문서: docs/RESEARCH_STANDARDS.md
# =============================================================================
# 사용법:
#   1. 이 파일을 복사하여 산출물 디렉토리에 research_context.yaml 로 저장
#   2. 모든 필드 작성 후 리서치 결과물과 함께 커밋
#   3. RESEARCH_STANDARDS.md의 체크리스트로 완성도 검증
# =============================================================================

# ------------------------------------------------------------------------------
# 1. research_date — 조사 수행 일시 (ISO 8601 형식)
# ------------------------------------------------------------------------------
# 형식: YYYY-MM-DDTHH:MM:SS+09:00 (KST 권장) 또는 YYYY-MM-DDTHH:MM:SSZ (UTC)
# 예시: 2026-03-26T14:30:00+09:00
# 주의: 조사 시작 시각 기준. "오늘" 같은 상대 표현 금지.
research_date: "YYYY-MM-DDTHH:MM:SS+09:00"

# ------------------------------------------------------------------------------
# 2. researcher_agent — 조사를 수행한 에이전트 또는 모델 식별자
# ------------------------------------------------------------------------------
# 형식: "<조직>/<에이전트명>" 또는 단독 에이전트명
# 허용값 예시:
#   - "리서치실/product-trend-researcher"
#   - "성장실/marketing-growth-hacker"
#   - "기획실/product-manager"
#   - "claude-code" (직접 실행 시)
#   - "gemini-cli" (gemini-cli 엔진 직접 실행 시)
researcher_agent: "<조직>/<에이전트명>"

# ------------------------------------------------------------------------------
# 3. model_version — 조사에 사용된 언어 모델 버전
# ------------------------------------------------------------------------------
# 형식: "<모델명>-<버전>" 또는 "<모델명>/<버전>"
# 허용값 예시:
#   - "gemini-2.5-flash"           ← 성장실/리서치실 기본값 (2026-03-26 기준 GA)
#   - "claude-sonnet-4-5"          ← 개발실/기획실/디자인실/PM 기본값
#   - "gpt-4o"
# 주의: "최신 모델" 같은 추상 표현 금지. 반드시 구체적 버전 문자열 기재.
# 참고: gemini-2.0-flash는 2026-06-01 서비스 종료 예정 — 사용 금지.
model_version: "gemini-2.5-flash"

# ------------------------------------------------------------------------------
# 4. infra_baseline_version — 조사 시점의 인프라 기준 버전
# ------------------------------------------------------------------------------
# 형식: "v<MAJOR>.<MINOR>.<PATCH>" 또는 "v<MAJOR>.<MINOR>.<PATCH>-<날짜>"
# 참조 파일: docs/infra-baseline.yaml (미생성 시 "unversioned" 기재)
# 허용값 예시:
#   - "v1.0.0"
#   - "v1.2.0-2026-03-26"
#   - "unversioned"     ← infra-baseline.yaml 미생성 기간 한시적 허용
# 목적: 인프라 변경으로 인한 지표 이상치/결과 차이를 사후 추적 가능하게 함
infra_baseline_version: "unversioned"

# ------------------------------------------------------------------------------
# 5. query_summary — 조사 질의 핵심 요약 (1~3줄)
# ------------------------------------------------------------------------------
# 형식: 자유 텍스트, 100자 이내 권장
# 예시:
#   - "국내 B2B SaaS 시장 규모 및 2026년 성장률 전망 조사"
#   - "경쟁사 A, B, C의 가격 정책 및 주요 기능 비교 분석"
#   - "Python asyncio 기반 Telegram 봇 프레임워크 레퍼런스 수집"
query_summary: "<조사 질의 핵심 요약>"

# ------------------------------------------------------------------------------
# 6. data_sources — 조사에 참조한 소스 목록
# ------------------------------------------------------------------------------
# 형식: YAML 리스트. 각 항목은 url 또는 ref(문서명/파일명) 중 하나 이상 필수.
# 필드:
#   - type: "web" | "internal_doc" | "paper" | "dataset" | "interview" | "other"
#   - url: 외부 URL (선택)
#   - ref: 내부 문서 경로 또는 파일명 (선택)
#   - accessed_at: 접근 일시 (ISO 8601, 선택)
#   - note: 소스 관련 부가 설명 (선택)
# 예시:
#   - type: "web"
#     url: "https://example.com/report-2026"
#     accessed_at: "2026-03-26T10:00:00+09:00"
#     note: "2026 SaaS 시장 보고서 전문"
#   - type: "internal_doc"
#     ref: "docs/OPENSOURCE_PLAN.md"
#     note: "오픈소스화 계획 내부 문서"
data_sources:
  - type: "<web|internal_doc|paper|dataset|interview|other>"
    url: "<URL 또는 생략>"
    ref: "<파일 경로 또는 생략>"
    accessed_at: "<YYYY-MM-DDTHH:MM:SS+09:00 또는 생략>"
    note: "<소스 설명>"

# ------------------------------------------------------------------------------
# 7. context_notes — 환경 특이사항 및 조사 한계 자유 기재
# ------------------------------------------------------------------------------
# 형식: 자유 텍스트 (멀티라인 가능)
# 기재 권장 항목:
#   - 조사 범위 제한 (예: 국내 자료만, 영문 자료만)
#   - 데이터 최신성 한계 (예: 모델 학습 컷오프 영향)
#   - 인프라/환경 이슈 (예: API rate limit으로 일부 소스 미수집)
#   - 후속 검증 필요 사항
# 예시: |
#   - 웹 검색 결과는 2026-03-26 기준이며, 1주일 이내 최신 자료 우선 수집.
#   - Gemini CLI 응답 지연으로 일부 소스 재시도 후 수집.
#   - 경쟁사 C의 가격 정보는 공식 홈페이지 기준 (협상가 미포함).
context_notes: |
  <환경 특이사항, 조사 한계, 후속 검증 필요 사항 등 자유 기재>
