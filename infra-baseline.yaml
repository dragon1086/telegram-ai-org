# =============================================================================
# infra-baseline.yaml — E2E 인프라 베이스라인 명세
#
# pre-flight 스크립트(tools/preflight_check.py)가 이 파일을 읽어
# E2E 실행 전 환경 유효성을 자동 검증한다.
#
# 변경 시 PR 필수 (운영 원칙: 2026-03-26 채택)
# =============================================================================

version: "1.1.0"
updated_at: "2026-03-26"

# ---------------------------------------------------------------------------
# timeout: E2E 테스트 전체 타임아웃 (초 단위, 0보다 큰 정수)
# pytest --timeout 플래그에 전달된다.
# ETC-02: 60s → 120s 상향 적용 (2026-03-26)
# ---------------------------------------------------------------------------
timeout: 120

# ---------------------------------------------------------------------------
# filter: pytest -k 패턴 (빈 문자열 = 필터 없음)
# 예) "not slow", "test_engine_compat", "pm_dispatch"
# ---------------------------------------------------------------------------
filter: ""

# ---------------------------------------------------------------------------
# env: E2E 실행에 필수인 환경변수 목록
#
# 검증 수준별 분류:
#   required  — 없으면 exit(1)
#   optional  — 없으면 경고(WARNING)만 출력
#
# E2E 테스트는 대부분 Mock을 사용하므로 실제 API 키는 optional로 분류.
# CI 환경에서 실패하지 않도록 최소 required 집합을 유지한다.
# ---------------------------------------------------------------------------
env:
  # E2E 테스트는 대부분 Mock/Fake 기반으로 실제 토큰 없이 실행 가능.
  # required: CI 환경에서도 반드시 존재해야 하는 최소 집합.
  required: []

  optional:
    - TELEGRAM_BOT_TOKEN          # 실제 봇 연동 테스트 시 필요
    - TELEGRAM_GROUP_CHAT_ID      # 실제 그룹 채팅 테스트 시 필요
    - ANTHROPIC_API_KEY           # claude-code 엔진 (없으면 mock 사용)
    - GEMINI_CLI_PATH             # gemini-cli 엔진 바이너리 경로
    - CODEX_CLI_PATH              # codex 엔진 바이너리 경로
    - OPENAI_API_KEY              # codex 엔진 API 키
    - ADMIN_CHAT_ID               # 관리자 알림 채팅 ID

# ---------------------------------------------------------------------------
# changelog — 변경 이력 (최신 항목이 상단)
# ---------------------------------------------------------------------------
changelog:
  - version: "1.1.0"
    date: "2026-03-26"
    tasks: [ETC-02, ETC-03]
    reason: "ETC-02: E2E timeout 60s→120s 상향 반영; ETC-03: telethon_listener min_id 필터 전략 명세화 (cross-contamination 재발 방지)"

  - version: "1.0.0"
    date: "2026-03-26"
    tasks: [RETRO-03]
    reason: "최초 생성 — E2E pre-flight 기준선 파일 신규 수립"
