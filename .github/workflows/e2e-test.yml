name: E2E Test

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: e2e-test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: E2E (${{ matrix.engine }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        engine:
          - claude-code
          - codex
          - gemini-cli
    env:
      PYTHONUTF8: "1"
      ENGINE_UNDER_TEST: ${{ matrix.engine }}
      CLAUDE_CLI_PATH: claude
      CODEX_CLI_PATH: codex
      GEMINI_CLI_PATH: gemini
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GEMINI_OAUTH_CREDS: ${{ secrets.GEMINI_OAUTH_CREDS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Prepare Gemini OAuth credentials
        if: matrix.engine == 'gemini-cli' && env.GEMINI_OAUTH_CREDS != ''
        run: |
          mkdir -p "${HOME}/.gemini"
          printf '%s' "${GEMINI_OAUTH_CREDS}" > "${HOME}/.gemini/oauth_creds.json"
          chmod 600 "${HOME}/.gemini/oauth_creds.json"

      - name: Report secret availability
        shell: bash
        run: |
          REQUIRED_SECRET_NAME=""
          REQUIRED_SECRET_VALUE=""

          case "${{ matrix.engine }}" in
            claude-code)
              REQUIRED_SECRET_NAME="ANTHROPIC_API_KEY"
              REQUIRED_SECRET_VALUE="${ANTHROPIC_API_KEY}"
              ;;
            codex)
              REQUIRED_SECRET_NAME="OPENAI_API_KEY"
              REQUIRED_SECRET_VALUE="${OPENAI_API_KEY}"
              ;;
            gemini-cli)
              REQUIRED_SECRET_NAME="GEMINI_OAUTH_CREDS"
              REQUIRED_SECRET_VALUE="${GEMINI_OAUTH_CREDS}"
              ;;
          esac

          if [ -z "${REQUIRED_SECRET_VALUE}" ]; then
            echo "::notice title=${REQUIRED_SECRET_NAME} missing::${{ matrix.engine }} live auth context is not configured."
            echo "::notice::Offline-safe E2E coverage continues."
          else
            echo "::notice title=${REQUIRED_SECRET_NAME} configured::${{ matrix.engine }} secret is available."
          fi

      - name: Validate orchestration config
        run: python tools/orchestration_cli.py validate-config

      - name: Run engine compatibility E2E
        run: |
          python -m pytest \
            tests/e2e/test_engine_compat_e2e.py \
            tests/e2e/test_pm_dispatch_e2e.py \
            -q
