name: CI

on:
  pull_request:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-e2e:
    name: Lint and E2E
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: "1"
      CLAUDE_CLI_PATH: claude
      CODEX_CLI_PATH: codex
      GEMINI_CLI_PATH: gemini
      HAS_GEMINI_OAUTH_CREDS: ${{ secrets.GEMINI_OAUTH_CREDS != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Restore Gemini OAuth credentials
        if: env.HAS_GEMINI_OAUTH_CREDS == 'true'
        env:
          GEMINI_OAUTH_CREDS: ${{ secrets.GEMINI_OAUTH_CREDS }}
        run: |
          mkdir -p "${HOME}/.gemini"
          printf '%s' "${GEMINI_OAUTH_CREDS}" > "${HOME}/.gemini/oauth_creds.json"
          chmod 600 "${HOME}/.gemini/oauth_creds.json"

      - name: Run lint
        run: ruff check telegram_ai_org

      - name: Validate orchestration config
        run: python tools/orchestration_cli.py validate-config

      - name: Run E2E tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: pytest tests/e2e/ -q
