name: ci

# PR 생성·업데이트 시 lint → unit-test → docker-build → e2e 순서로 검증
on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# ── 공통 환경 변수 (모든 job에서 재사용) ─────────────────────────────────────
env:
  PYTHON_VERSION: "3.11"
  DOCKER_IMAGE: telegram-ai-org
  PYTHONUTF8: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  CLAUDE_CLI_PATH: claude
  CODEX_CLI_PATH: codex
  GEMINI_CLI_PATH: gemini

jobs:
  # ── Job 1: Lint (ruff) ────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run Ruff lint
        run: python -m ruff check telegram_ai_org

      - name: Run Ruff format check
        run: python -m ruff format --check telegram_ai_org

  # ── Job 2: Unit Tests (pytest, e2e 제외) ──────────────────────────────────
  unit-test:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          python -m pytest tests/ \
            --ignore=tests/e2e \
            --ignore=tests/integration \
            -q --tb=short \
            -x

  # ── Job 3: Docker Build 검증 (push 없음) ─────────────────────────────────
  docker-build:
    name: Docker build (verify, no push)
    runs-on: ubuntu-latest
    needs: [lint, unit-test]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (base — 빌드 검증만)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ${{ env.DOCKER_IMAGE }}:pr-${{ github.event.pull_request.number || 'dev' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 4: E2E 회귀 테스트 ──────────────────────────────────────────────
  e2e:
    name: E2E regression (tests/e2e/)
    runs-on: ubuntu-latest
    needs: [lint, unit-test]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Validate orchestration config
        run: python tools/orchestration_cli.py validate-config

      - name: Assert infra-baseline version (pre-merge check)
        # ETC-02/ETC-03 재발 방지: PR 머지 전 infra-baseline.yaml 버전 1.1.0 이상 확인
        run: |
          python - <<'EOF'
          import yaml, sys, re
          from pathlib import Path

          REQUIRED_VERSION = "1.1.0"

          def version_tuple(v):
              return tuple(int(x) for x in re.sub(r"[^0-9.]", "", v).split("."))

          baseline_path = Path("infra-baseline.yaml")
          if not baseline_path.exists():
              print("::error::infra-baseline.yaml not found")
              sys.exit(1)

          data = yaml.safe_load(baseline_path.read_text())
          actual = str(data.get("version", "0.0.0"))

          if version_tuple(actual) < version_tuple(REQUIRED_VERSION):
              print(f"::error::infra-baseline version {actual} < required {REQUIRED_VERSION}")
              print("::error::ETC-02/ETC-03 기준 미달 — infra-baseline.yaml 업데이트 필요")
              sys.exit(1)

          print(f"✅ infra-baseline version OK: {actual} >= {REQUIRED_VERSION}")
          EOF

      - name: Run E2E suite
        run: |
          python -m pytest tests/e2e/ \
            -q --tb=short \
            --cov=tools.gemini_cli_runner \
            --cov=tools.codex_runner \
            --cov=tools.base_runner \
            --cov=tools.claude_subprocess_runner \
            --cov-fail-under=90 \
            --cov-report=term-missing
