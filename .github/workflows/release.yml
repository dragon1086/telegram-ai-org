name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    name: Verify before release
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: "1"
      CLAUDE_CLI_PATH: claude
      CODEX_CLI_PATH: codex
      GEMINI_CLI_PATH: gemini
      HAS_GEMINI_OAUTH_CREDS: ${{ secrets.GEMINI_OAUTH_CREDS != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Restore Gemini OAuth credentials
        if: env.HAS_GEMINI_OAUTH_CREDS == 'true'
        env:
          GEMINI_OAUTH_CREDS: ${{ secrets.GEMINI_OAUTH_CREDS }}
        run: |
          mkdir -p "${HOME}/.gemini"
          printf '%s' "${GEMINI_OAUTH_CREDS}" > "${HOME}/.gemini/oauth_creds.json"
          chmod 600 "${HOME}/.gemini/oauth_creds.json"

      - name: Run lint
        run: ruff check telegram_ai_org

      - name: Validate orchestration config
        run: python tools/orchestration_cli.py validate-config

      - name: Run E2E tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: pytest tests/e2e/ -q

  publish-pypi:
    name: Publish PyPI package
    runs-on: ubuntu-latest
    needs:
      - verify

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install packaging tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build distribution
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Upload to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: python -m twine upload --skip-existing dist/*

  docker-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs:
      - publish-pypi
    env:
      IMAGE_NAME: ${{ github.event.repository.name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
