name: release

# v* 태그 푸시 시 Docker Hub 버전 태그 이미지 푸시 + GitHub Release 자동 생성
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # GitHub Release 생성에 필요
  packages: write

# ── 공통 환경 변수 ─────────────────────────────────────────────────────────
env:
  PYTHON_VERSION: "3.11"
  DOCKER_IMAGE: telegram-ai-org
  PYTHONUTF8: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  # ── Job 1: Docker Hub — 버전 태그 이미지 빌드 및 푸시 ─────────────────
  docker-release:
    name: Push Docker image with version tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 전체 히스토리 (CHANGELOG 생성용)

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image (version tag + latest)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE }}:${{ steps.tag.outputs.value }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE }}:latest
          labels: |
            org.opencontainers.image.version=${{ steps.tag.outputs.value }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: GitHub Release 자동 생성 ─────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [docker-release]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        id: notes
        env:
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          TAG: ${{ steps.tag.outputs.value }}
          DOCKER_IMG: ${{ env.DOCKER_IMAGE }}
        run: |
          # 이전 태그 탐색 (없으면 첫 커밋부터)
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${TAG}$" | head -1 || true)

          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${TAG}"
          else
            RANGE="HEAD"
          fi

          # CHANGELOG.md 최상단 섹션 추출 (없으면 git log 사용)
          CHANGELOG_BODY=""
          if [ -f "CHANGELOG.md" ]; then
            CHANGELOG_BODY=$(awk '/^## /{if(found) exit; found=1} found{print}' CHANGELOG.md | head -60)
          fi

          if [ -n "$CHANGELOG_BODY" ]; then
            COMMIT_LOG="$CHANGELOG_BODY"
          else
            COMMIT_LOG=$(git log "${RANGE}" --pretty=format:"- %s (%h)" --no-merges | head -40)
          fi

          # 릴리즈 노트를 파일로 저장 (백틱 등 특수문자 안전 처리)
          python3 - <<PYEOF
          import os, textwrap
          tag = os.environ["TAG"]
          user = os.environ.get("DOCKERHUB_USER", "<dockerhub-username>")
          img = os.environ["DOCKER_IMG"]
          commit_log = """${COMMIT_LOG}"""

          body = f"""{commit_log}

          ## Docker Image

              docker pull {user}/{img}:{tag}
              docker run --env-file .env {user}/{img}:{tag}
          """
          with open("release_notes.md", "w") as f:
              f.write(textwrap.dedent(body).strip())
          PYEOF

          echo "notes_file=release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: ${{ steps.tag.outputs.value }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.value, '-rc') || contains(steps.tag.outputs.value, '-beta') || contains(steps.tag.outputs.value, '-alpha') }}
          generate_release_notes: false

      - name: Release summary
        run: |
          echo "## Release Created" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag**: \`${{ steps.tag.outputs.value }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Docker**: \`${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE }}:${{ steps.tag.outputs.value }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **GitHub Release**: https://github.com/${{ github.repository }}/releases/tag/${{ steps.tag.outputs.value }}" >> "$GITHUB_STEP_SUMMARY"
