name: Docker Build Push

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: docker-build-push-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  docker:
    name: Docker (${{ matrix.engine }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        engine:
          - claude
          - codex
          - gemini
    env:
      IMAGE_REPO: ${{ secrets.DOCKER_USERNAME }}/telegram-ai-org

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Compute Docker tags
        id: meta
        shell: bash
        run: |
          TAGS="${IMAGE_REPO}:${{ matrix.engine }}-${GITHUB_SHA::7}"

          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TAGS="${TAGS},${IMAGE_REPO}:${{ matrix.engine }}-latest"
          fi

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            TAGS="${TAGS},${IMAGE_REPO}:${{ matrix.engine }}-${VERSION}"
          fi

          echo "tags=${TAGS}" >> "${GITHUB_OUTPUT}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            ENGINE=${{ matrix.engine }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
