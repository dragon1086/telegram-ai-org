name: ci-e2e

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  PYTHONUTF8: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  CLAUDE_CLI_PATH: claude
  CODEX_CLI_PATH: codex
  GEMINI_CLI_PATH: gemini

jobs:
  e2e:
    name: e2e-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Validate orchestration config
        run: python tools/orchestration_cli.py validate-config

      - name: Run E2E suite
        run: |
          python -m pytest tests/e2e/ -q --tb=short \
            --cov=tools.gemini_cli_runner \
            --cov=tools.codex_runner \
            --cov=tools.base_runner \
            --cov=tools.claude_subprocess_runner \
            --cov=core.pm_router \
            --cov=core.nl_classifier \
            --cov=core.constants \
            --cov-fail-under=95 \
            --cov-report=term-missing \
            --cov-report=json:tests/e2e/coverage_e2e.json
