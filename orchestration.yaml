    - architect
    - writer
    preferred_skills: []
    avoid_agents: []
    max_team_size: 3
    guidance: 전체 조율과 사용자 응답 품질을 우선한다.
  research_strategy:
    preferred_engine: codex
    fallback_engine: claude-code
    execution_mode: sequential
    preferred_agents:
    - analyst
    - writer
    preferred_skills: []
    avoid_agents: []
    max_team_size: 3
    guidance: 출처와 비교 기준을 명확히 남긴다.
  engineering_delivery:
    preferred_engine: codex
    fallback_engine: claude-code
    execution_mode: sequential
    preferred_agents:
