schema_version: 1
runtime:
  docs_root: docs/orchestration-v2
  run_state_root: .ai-org/runs

# 모든 엔진(claude-code, codex, gemini)의 시스템 프롬프트에 주입되는 글로벌 규칙.
# CLAUDE.md/AGENTS.md를 자동으로 읽지 않는 엔진(gemini 등)에도 적용된다.
global_instructions: |
  ## [최우선 원칙] PM 업무 스코프 준수 (전체 조직 공통 — 모든 아래 규칙보다 우선)
  이 원칙은 모든 specialist/PM 조직에 예외 없이 적용된다.
  각 조직은 PM이 해당 태스크에 명시한 "실행 범위" 내의 작업만 수행한다.
  PM이 명시하지 않은 추가 작업·리팩터링·기능 확장·자기 개선·배포·재기동은
  PM의 명시적 지시 없이 수행하지 않는다.
  스코프 외 작업이 필요하다고 판단되면:
    - 직접 실행하지 말고 PM에게 보고하거나 [COLLAB] 태그로 적절한 조직에 위임 요청한다.
    - 모호한 경우에도 확장하지 말고 PM에게 확인을 구한다.
  예외: PM이 해당 태스크에서 명시적으로 허용한 경우, 또는 서비스 전체 장애 긴급 상황.

  ## 배포·인프라 작업 전담 원칙 (전체 조직 공통 — 필수)
  아래 세 가지 작업은 인프라/배포 역할 조직(organizations.yaml에서 capabilities에 `infra`가 포함된 조직) 전용이며,
  해당 역할 조직 외의 조직은 직접 수행하지 않는다:
    - git push / git merge to main
    - 봇 재기동 (restart_bots.sh, request_restart.sh 포함)
    - 프로덕션 배포 / 인프라 변경
  스콥 외 작업이 필요하다고 판단되면: 직접 실행하지 말고, PM에게 보고하거나 [COLLAB] 태그로 infra 역할 조직에 위임 요청.
  긴급 상황(서비스 전체 장애) 또는 PM의 명시적 지시가 있을 때만 예외 허용.

  ## Git 워크트리 워크플로 (필수)
  이 프로젝트를 수정하는 모든 봇/세션에 적용된다.
  현재 브랜치가 main이 아닌 상태에서 새 태스크(= 현재 브랜치 작업과 무관한 요청)를 받으면:
  1. git branch --show-current 로 현재 브랜치 확인. main이면 평소대로 진행.
  2. main이 아니면 워크트리 생성: git worktree add .worktrees/<task-slug> main && cd .worktrees/<task-slug> && git checkout -b fix/<task-slug>
  3. 워크트리 안에서 작업 → 테스트 → 커밋.
  4. 프로젝트 루트로 이동 후 main에 머지: git checkout main && git merge fix/<task-slug> --no-ff
  5. 정리: git worktree remove .worktrees/<task-slug> && git branch -d fix/<task-slug>
  6. 원래 브랜치로 복귀.
  판단: 현재 브랜치 작업의 연장이면 그냥 계속. 무관한 새 요청이면 워크트리 필수. 확신 없으면 워크트리.

  ## 현재 시간 사용 원칙 (전체 조직 공통 — 필수)
  모든 봇은 태스크 수행 시작 전 반드시 현재 시각을 확인(date 명령 또는 시스템 시간 API)한다.
  - 조사·검색·레퍼런스 수집 등 시간 의존성이 있는 모든 작업은 "현재 시각 기준"으로 수행한다.
  - 사용자가 명시적으로 과거 시점을 지정하지 않는 한, 항상 현재 날짜/시간 기준으로 판단한다.
  - 보고서·산출물에 조사 기준 시점("2026-03-22 기준" 등)을 반드시 명시한다.
  - 예: 웹검색 시 "2026년 최신" 키워드 사용, 모델/라이브러리 버전 확인 시 현재 날짜 기준 최신 여부 판단.

  ## 위험한 시스템 탐색 절대 금지 (전체 조직 공통 — 필수)
  에이전트가 직접 작성·실행하는 코드(Python/shell/subprocess 포함)에서 아래 패턴은 절대 사용하지 않는다.
  위반 시 CPU/메모리 고갈로 사용자 시스템 먹통 발생 가능 (2026-03-23 실제 인시던트 기록).

  절대 금지:
    - glob.glob(str(Path.home()) + '/**/*', recursive=True)  # 홈 전체 재귀 탐색
    - glob.glob('/Users/**/*', recursive=True)
    - os.walk(Path.home()) / os.walk('/')
    - find ~ -name '*' / find / -name '*'  # 쉘에서도 동일하게 금지
    - 프로젝트 외부 디렉토리를 recursive=True 로 탐색하는 모든 패턴

  허용 패턴 — 반드시 프로젝트 디렉토리 내부로 스코프 제한:
    - glob.glob(os.environ.get('CLAUDE_PROJECT_DIR', '.') + '/**/*.db', recursive=True)
    - os.walk('/Users/rocky/telegram-ai-org/')
    - find /Users/rocky/telegram-ai-org -name '*.db'

phase_policies:
  default:
    order:
    - intake
    - planning
    - design
    - implementation
    - verification
    - feedback
    required_documents:
      intake:
      - request-brief.md
      planning:
      - plan.md
      design:
      - design.md
      implementation:
      - implementation.md
      verification:
      - verification.md
      feedback:
      - feedback.md
    announce_plan_on_start: true
    announce_progress: true
    require_goal_feedback: true
backend_policies:
  orchestrator_default:
    direct_reply: resume_session
    local_execution: resume_session
    delegated_execution: tmux_batch
    long_running: tmux_batch
  specialist_default:
    direct_reply: ephemeral
    local_execution: resume_session
    delegated_execution: tmux_batch
    long_running: tmux_batch
session_policies:
  orchestrator_default:
    max_messages_before_compact: 80
    warn_threshold_percent: 70
    compact_threshold_percent: 80
    stale_after_minutes: 180
  specialist_default:
    max_messages_before_compact: 50
    warn_threshold_percent: 70
    compact_threshold_percent: 80
    stale_after_minutes: 180
