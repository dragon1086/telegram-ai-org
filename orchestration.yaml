    - debugger
    preferred_skills: []
    avoid_agents: []
    max_team_size: 3
    guidance: 구현과 검증을 함께 수행한다.
  design_strategy:
    preferred_engine: claude-code
    fallback_engine: codex
    execution_mode: sequential
    preferred_agents:
    - designer
    - writer
    preferred_skills: []
    avoid_agents: []
    max_team_size: 3
    guidance: 사용자 경험과 전달 명확성을 우선한다.
  product_strategy:
    preferred_engine: claude-code
    fallback_engine: codex
    execution_mode: sequential
    preferred_agents:
